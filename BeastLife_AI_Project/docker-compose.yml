version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: beastlife_postgres
    environment:
      POSTGRES_USER: beastlife
      POSTGRES_PASSWORD: beastlife_secure_pass
      POSTGRES_DB: beastlife_care
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beastlife"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beastlife_api
    environment:
      LLM_PROVIDER: groq # Change to "gemini" if using Google Gemini
      GROQ_API_KEY: ${GROQ_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DATABASE_URL: postgresql://beastlife:beastlife_secure_pass@postgres:5432/beastlife_care
      API_HOST: 0.0.0.0
      API_PORT: 8000
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "src.api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Streamlit Dashboard
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: beastlife_dashboard
    ports:
      - "8501:8501"
    depends_on:
      - api
    volumes:
      - ./logs:/app/logs
    command:
      [
        "streamlit",
        "run",
        "src/dashboard/app.py",
        "--server.port=8501",
        "--server.headless=true",
      ]

  # Optional: Redis for Caching
  redis:
    image: redis:7-alpine
    container_name: beastlife_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: beastlife_network
